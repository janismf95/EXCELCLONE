<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foglio di Calcolo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { font-family: 'Segoe UI', Calibri, Arial, sans-serif; font-size: 13px; background: #f0f0f0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: #212121; }

  /* TITLE BAR */
  #titlebar { background: #217346; color: white; padding: 6px 12px; display: flex; align-items: center; gap: 12px; font-size: 13px; }
  #titlebar .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  #titlebar .filename { font-size: 13px; opacity: 0.9; }
  #titlebar .spacer { flex: 1; }
  #titlebar .btns button { background: transparent; border: none; color: white; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 12px; }
  #titlebar .btns button:hover { background: rgba(255,255,255,0.2); }

  /* RIBBON */
  #ribbon { background: #fff; border-bottom: 1px solid #d0d0d0; }
  #ribbon-tabs { display: flex; background: #217346; padding: 0 4px; }
  #ribbon-tabs button { background: transparent; border: none; color: rgba(255,255,255,0.85); padding: 6px 14px; font-size: 12px; cursor: pointer; border-radius: 3px 3px 0 0; }
  #ribbon-tabs button.active { background: #fff; color: #217346; font-weight: 600; }
  #ribbon-tabs button:not(.active):hover { background: rgba(255,255,255,0.15); color: white; }

  #ribbon-content { display: flex; align-items: center; padding: 4px 8px; gap: 2px; flex-wrap: wrap; min-height: 44px; }
  .ribbon-group { display: flex; align-items: center; gap: 2px; padding: 0 6px; border-right: 1px solid #e0e0e0; }
  .ribbon-group:last-child { border-right: none; }
  .ribbon-group label { font-size: 10px; color: #666; display: block; text-align: center; margin-top: 1px; }

  .rb { background: transparent; border: 1px solid transparent; border-radius: 3px; padding: 3px 6px; cursor: pointer; font-size: 12px; color: #212121; display: flex; flex-direction: column; align-items: center; min-width: 28px; }
  .rb:hover { background: #e8e8e8; border-color: #ccc; }
  .rb.active { background: #c8e6c9; border-color: #217346; }
  .rb svg { width: 16px; height: 16px; }

  select.rb-select { border: 1px solid #ccc; border-radius: 3px; padding: 3px 4px; font-size: 12px; background: white; cursor: pointer; height: 26px; }
  input.rb-input { border: 1px solid #ccc; border-radius: 3px; padding: 3px 6px; font-size: 12px; width: 48px; height: 26px; }

  .color-btn { width: 26px; height: 26px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
  .color-indicator { position: absolute; bottom: 0; left: 2px; right: 2px; height: 4px; border-radius: 1px; }

  /* FORMULA BAR */
  #formulabar { display: flex; align-items: center; border-bottom: 1px solid #d0d0d0; background: #fff; padding: 2px 4px; gap: 4px; }
  #cell-ref { width: 72px; border: 1px solid #ccc; border-radius: 3px; padding: 3px 6px; font-size: 12px; text-align: center; font-weight: 600; }
  #formula-separator { color: #999; padding: 0 2px; font-size: 16px; }
  #formula-input { flex: 1; border: 1px solid transparent; border-radius: 3px; padding: 3px 6px; font-size: 12px; outline: none; font-family: 'Consolas', monospace; }
  #formula-input:focus { border-color: #217346; background: #f0fff4; }
  #fx-label { font-size: 12px; color: #555; font-style: italic; padding: 0 4px; }
  #btn-edit-cell { background: #217346; color: white; border: none; border-radius: 3px; padding: 4px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; touch-action: manipulation; }
  #btn-edit-cell:active { background: #1a5c38; }

  /* SPREADSHEET AREA */
  #sheet-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  #grid-wrapper { flex: 1; overflow: auto; position: relative; }

  table#grid { border-collapse: collapse; table-layout: fixed; }
  table#grid th, table#grid td { border: 1px solid #d0d0d0; padding: 0; position: relative; }

  /* HEADER ROW / COL */
  .col-header { background: #f2f2f2; text-align: center; font-size: 11px; font-weight: 600; color: #666; min-width: 64px; width: 64px; height: 20px; cursor: pointer; border-bottom: 2px solid #c0c0c0; white-space: nowrap; overflow: hidden; position: sticky; top: 0; z-index: 10; }
  .col-header:hover, .col-header.sel { background: #d6e4f0; color: #1a5fa8; }
  .col-header.sel { border-bottom-color: #217346; }
  .row-header { background: #f2f2f2; text-align: center; font-size: 11px; font-weight: 600; color: #666; width: 44px; min-width: 44px; max-width: 44px; height: 22px; cursor: pointer; border-right: 2px solid #c0c0c0; position: sticky; left: 0; z-index: 5; }
  .row-header:hover, .row-header.sel { background: #d6e4f0; color: #1a5fa8; }
  .corner-header { background: #f2f2f2; position: sticky; top: 0; left: 0; z-index: 20; border-right: 2px solid #c0c0c0; border-bottom: 2px solid #c0c0c0; cursor: pointer; width: 44px; min-width: 44px; }
  .corner-header:hover { background: #d0d0d0; }

  /* CELLS */
  .cell { height: 22px; min-width: 64px; width: 64px; max-width: 64px; overflow: hidden; white-space: nowrap; font-size: 12px; padding: 0 4px; cursor: cell; outline: none; }
  .cell.selected { background: #e8f4fd !important; outline: 2px solid #217346; outline-offset: -2px; z-index: 3; }
  .cell.in-range { background: #e8f4fd !important; }
  .cell.editing { outline: 2px solid #217346; background: white !important; }

  .cell-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; outline: 2px solid #217346; outline-offset: -2px; padding: 0 4px; font-size: 12px; font-family: inherit; background: white; z-index: 100; }

  /* ALIGNMENT */
  .align-left { text-align: left; }
  .align-center { text-align: center; }
  .align-right { text-align: right; }

  /* SHEET TABS */
  #sheet-tabs { background: #f0f0f0; border-top: 1px solid #d0d0d0; display: flex; align-items: center; padding: 0 4px; gap: 2px; min-height: 28px; overflow-x: auto; }
  .sheet-tab { background: #e0e0e0; border: 1px solid #c0c0c0; border-bottom: none; border-radius: 3px 3px 0 0; padding: 4px 14px; font-size: 11px; cursor: pointer; white-space: nowrap; }
  .sheet-tab.active { background: #fff; border-bottom: 1px solid #fff; color: #217346; font-weight: 600; }
  .sheet-tab:not(.active):hover { background: #d0d0d0; }
  #add-sheet { background: transparent; border: none; font-size: 18px; cursor: pointer; color: #555; padding: 2px 8px; line-height: 1; }
  #add-sheet:hover { color: #217346; }

  /* STATUS BAR */
  #statusbar { background: #217346; color: white; padding: 2px 12px; font-size: 11px; display: flex; gap: 16px; align-items: center; }
  #statusbar span { opacity: 0.9; }
  #statusbar .stats { margin-left: auto; display: flex; gap: 16px; }

  /* CONTEXT MENU */
  #ctx-menu { position: fixed; background: white; border: 1px solid #ccc; border-radius: 4px; box-shadow: 2px 4px 12px rgba(0,0,0,0.2); z-index: 1000; min-width: 180px; display: none; padding: 4px 0; }
  .ctx-item { padding: 6px 20px; cursor: pointer; font-size: 12px; }
  .ctx-item:hover { background: #e8f4e8; color: #217346; }
  .ctx-sep { border-top: 1px solid #e0e0e0; margin: 3px 0; }
  .ctx-item.danger:hover { background: #fdecea; color: #c62828; }

  /* COLOR PICKER POPUP */
  .color-popup { position: absolute; background: white; border: 1px solid #ccc; border-radius: 4px; box-shadow: 2px 4px 12px rgba(0,0,0,0.2); z-index: 500; padding: 6px; display: none; flex-wrap: wrap; gap: 3px; width: 140px; top: 30px; }
  .color-swatch { width: 18px; height: 18px; border-radius: 2px; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); }
  .color-swatch:hover { transform: scale(1.2); }

  /* RESIZE HANDLE */
  .col-resize { position: absolute; right: 0; top: 0; bottom: 0; width: 4px; cursor: col-resize; z-index: 15; }
  .col-resize:hover, .col-resize.dragging { background: #217346; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #f0f0f0; }
  ::-webkit-scrollbar-thumb { background: #bbb; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #999; }
  ::-webkit-scrollbar-corner { background: #f0f0f0; }

  /* FILL HANDLE */
  .fill-handle { position: absolute; bottom: -3px; right: -3px; width: 7px; height: 7px; background: #217346; border: 1px solid white; cursor: crosshair; z-index: 10; display: none; }
  .cell.selected .fill-handle { display: block; }

  /* FIND BAR */
  #find-bar { display: none; position: absolute; top: 8px; right: 20px; background: white; border: 1px solid #aaa; border-radius: 4px; padding: 6px 10px; box-shadow: 2px 4px 12px rgba(0,0,0,0.2); z-index: 500; display: none; gap: 6px; align-items: center; }
  #find-bar.visible { display: flex; }
  #find-bar input { border: 1px solid #ccc; border-radius: 3px; padding: 3px 8px; font-size: 12px; width: 180px; }
  #find-bar button { border: 1px solid #ccc; background: #f5f5f5; border-radius: 3px; padding: 3px 10px; cursor: pointer; font-size: 12px; }
  #find-bar button:hover { background: #e0e0e0; }
</style>
</head>
<body>

<!-- TITLE BAR -->
<div id="titlebar">
  <div class="logo">X</div>
  <div class="filename" id="filename-lbl">Cartella1.xlsx</div>
  <div class="spacer"></div>
  <div class="btns">
    <button onclick="saveCSV()">💾 Salva CSV</button>
    <button onclick="loadCSV()">📂 Apri CSV</button>
    <button onclick="printSheet()">🖨 Stampa</button>
  </div>
</div>
<input type="file" id="csv-file" accept=".csv" style="display:none" onchange="handleCSV(event)">

<!-- RIBBON TABS -->
<div id="ribbon">
  <div id="ribbon-tabs">
    <button class="active">Home</button>
    <button onclick="showInsert()">Inserisci</button>
    <button onclick="showFormulas()">Formule</button>
    <button onclick="showData()">Dati</button>
    <button onclick="showView()">Visualizza</button>
  </div>
  <div id="ribbon-content">
    <!-- Clipboard -->
    <div class="ribbon-group">
      <button class="rb" title="Copia (Ctrl+C)" onclick="copyCell()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="9" height="12" rx="1"/><rect x="2" y="5" width="9" height="9" rx="1" fill="white"/></svg>
        <label>Copia</label>
      </button>
      <button class="rb" title="Taglia (Ctrl+X)" onclick="cutCell()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/><circle cx="4" cy="12" r="2"/><circle cx="12" cy="12" r="2"/></svg>
        <label>Taglia</label>
      </button>
      <button class="rb" title="Incolla (Ctrl+V)" onclick="pasteCell()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="5" width="9" height="10" rx="1"/><path d="M6 5V3h4v2"/></svg>
        <label>Incolla</label>
      </button>
    </div>
    <!-- Font -->
    <div class="ribbon-group">
      <select class="rb-select" id="font-family" onchange="applyFont()" style="width:110px">
        <option>Calibri</option><option>Arial</option><option>Times New Roman</option>
        <option>Courier New</option><option>Georgia</option><option>Verdana</option>
        <option>Tahoma</option><option>Comic Sans MS</option>
      </select>
      <input class="rb-input" id="font-size" type="number" value="11" min="6" max="72" onchange="applyFontSize()" style="width:44px">
      <button class="rb" id="btn-bold" title="Grassetto (Ctrl+B)" onclick="toggleBold()">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 3h5a3.5 3.5 0 0 1 0 7H4V3zm0 7h5.5a3.5 3.5 0 0 1 0 7H4v-7z" opacity="0.8"/><text x="3" y="12" style="font-weight:900;font-size:11px;fill:#212121">B</text></svg>
        <label>Gras.</label>
      </button>
      <button class="rb" id="btn-italic" title="Corsivo (Ctrl+I)" onclick="toggleItalic()">
        <svg viewBox="0 0 16 16"><text x="4" y="12" style="font-style:italic;font-weight:600;font-size:12px;fill:#212121">I</text></svg>
        <label>Cors.</label>
      </button>
      <button class="rb" id="btn-underline" title="Sottolineato (Ctrl+U)" onclick="toggleUnderline()">
        <svg viewBox="0 0 16 16"><text x="2" y="10" style="font-size:11px;text-decoration:underline;fill:#212121">U</text><line x1="2" y1="14" x2="14" y2="14" stroke="currentColor" stroke-width="1.5"/></svg>
        <label>Sott.</label>
      </button>
    </div>
    <!-- Colors -->
    <div class="ribbon-group" style="position:relative">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <button class="color-btn" id="bg-color-btn" title="Colore sfondo" onclick="toggleColorPicker('bg')">
          <svg viewBox="0 0 16 16" width="18" height="18"><text x="2" y="13" style="font-size:12px;font-weight:700;fill:#212121">A</text></svg>
          <div class="color-indicator" id="bg-indicator" style="background:#ffff00"></div>
        </button>
        <label style="font-size:10px;color:#666">Sfondo</label>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <button class="color-btn" id="fg-color-btn" title="Colore testo" onclick="toggleColorPicker('fg')">
          <svg viewBox="0 0 16 16" width="18" height="18"><text x="2" y="13" style="font-size:12px;font-weight:700;fill:#212121">A</text></svg>
          <div class="color-indicator" id="fg-indicator" style="background:#000000"></div>
        </button>
        <label style="font-size:10px;color:#666">Testo</label>
      </div>
      <div id="color-popup-bg" class="color-popup"></div>
      <div id="color-popup-fg" class="color-popup" style="left:32px"></div>
    </div>
    <!-- Alignment -->
    <div class="ribbon-group">
      <button class="rb" title="Allinea a sinistra" onclick="setAlign('left')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="5" x2="14" y2="5"/><line x1="2" y1="8" x2="10" y2="8"/><line x1="2" y1="11" x2="14" y2="11"/></svg>
        <label>Sin.</label>
      </button>
      <button class="rb" title="Centra" onclick="setAlign('center')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="5" x2="14" y2="5"/><line x1="4" y1="8" x2="12" y2="8"/><line x1="2" y1="11" x2="14" y2="11"/></svg>
        <label>Centro</label>
      </button>
      <button class="rb" title="Allinea a destra" onclick="setAlign('right')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="5" x2="14" y2="5"/><line x1="6" y1="8" x2="14" y2="8"/><line x1="2" y1="11" x2="14" y2="11"/></svg>
        <label>Des.</label>
      </button>
    </div>
    <!-- Number Format -->
    <div class="ribbon-group">
      <select class="rb-select" id="num-format" onchange="applyNumFormat()" style="width:100px">
        <option value="general">Generale</option>
        <option value="number">Numero</option>
        <option value="currency">€ Valuta</option>
        <option value="percent">% Percento</option>
        <option value="date">Data</option>
        <option value="text">Testo</option>
      </select>
    </div>
    <!-- Operations -->
    <div class="ribbon-group">
      <button class="rb" title="Somma automatica" onclick="insertFormula('SUM')">
        <svg viewBox="0 0 16 16" fill="currentColor"><text x="1" y="13" style="font-size:13px;font-weight:700">Σ</text></svg>
        <label>Somma</label>
      </button>
      <button class="rb" title="Media" onclick="insertFormula('AVERAGE')">
        <svg viewBox="0 0 16 16" fill="currentColor"><text x="0" y="12" style="font-size:10px;font-weight:600">AVG</text></svg>
        <label>Media</label>
      </button>
      <button class="rb" title="Ordina A→Z" onclick="sortRange('asc')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l4 8 4-8"/><line x1="2" y1="10" x2="14" y2="10"/></svg>
        <label>A→Z</label>
      </button>
      <button class="rb" title="Ordina Z→A" onclick="sortRange('desc')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 12l4-8 4 8"/><line x1="2" y1="6" x2="14" y2="6"/></svg>
        <label>Z→A</label>
      </button>
      <button class="rb" title="Trova (Ctrl+F)" onclick="toggleFind()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
        <label>Trova</label>
      </button>
    </div>
    <!-- Borders -->
    <div class="ribbon-group">
      <button class="rb" onclick="applyBorder('all')" title="Bordi cella">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12"/><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        <label>Bordi</label>
      </button>
      <button class="rb" onclick="applyBorder('none')" title="Nessun bordo">
        <svg viewBox="0 0 16 16" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"><rect x="2" y="2" width="12" height="12"/></svg>
        <label>Nessuno</label>
      </button>
    </div>
    <!-- Undo/Redo -->
    <div class="ribbon-group">
      <button class="rb" title="Annulla (Ctrl+Z)" onclick="undoAction()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7a5 5 0 1 1 1 5.4"/><polyline points="3,3 3,7 7,7"/></svg>
        <label>Annulla</label>
      </button>
      <button class="rb" title="Ripristina (Ctrl+Y)" onclick="redoAction()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 7a5 5 0 1 0-1 5.4"/><polyline points="13,3 13,7 9,7"/></svg>
        <label>Ripristina</label>
      </button>
    </div>
  </div>
</div>

<!-- FORMULA BAR -->
<div id="formulabar">
  <input type="text" id="cell-ref" value="A1" readonly>
  <span id="fx-label"><i>fx</i></span>
  <input type="text" id="formula-input" placeholder="Inserisci valore o formula (es. =SOMMA(A1:A10))" onkeydown="formulaKeyDown(event)" oninput="formulaInput(event)">
  <button id="btn-edit-cell" onclick="startEdit(selectedCell.r, selectedCell.c)" title="Modifica cella (doppio tocco)">✏️ Modifica</button>
</div>

<!-- FIND BAR -->
<div id="find-bar">
  <span style="font-size:12px;color:#555">Trova:</span>
  <input type="text" id="find-input" placeholder="Cerca…" onkeydown="findKeyDown(event)" oninput="doFind()">
  <button onclick="findNext(-1)">◀</button>
  <button onclick="findNext(1)">▶</button>
  <span id="find-count" style="font-size:11px;color:#888"></span>
  <button onclick="toggleFind()" style="background:transparent;border:none;cursor:pointer;font-size:14px">✕</button>
</div>

<!-- SPREADSHEET -->
<div id="sheet-container">
  <div id="grid-wrapper">
    <table id="grid" cellspacing="0"></table>
  </div>

  <!-- SHEET TABS -->
  <div id="sheet-tabs">
    <div id="tabs-list"></div>
    <button id="add-sheet" onclick="addSheet()" title="Aggiungi foglio">+</button>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <span id="status-mode">Pronto</span>
    <div class="stats">
      <span id="stat-count"></span>
      <span id="stat-sum"></span>
      <span id="stat-avg"></span>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxCopy()">📋 Copia</div>
  <div class="ctx-item" onclick="ctxCut()">✂️ Taglia</div>
  <div class="ctx-item" onclick="ctxPaste()">📌 Incolla</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxInsertRow()">➕ Inserisci riga</div>
  <div class="ctx-item" onclick="ctxDeleteRow()">🗑 Elimina riga</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxInsertCol()">➕ Inserisci colonna</div>
  <div class="ctx-item" onclick="ctxDeleteCol()">🗑 Elimina colonna</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="clearCells()">🧹 Cancella contenuto</div>
  <div class="ctx-item danger" onclick="clearFormatting()">🎨 Cancella formato</div>
</div>

<script>
const ROWS = 50, COLS = 26;
const sheets = [{ name: 'Foglio1', data: {}, style: {}, colWidths: {} }];
let currentSheet = 0;
let selectedCell = { r: 0, c: 0 };
let selectionRange = null;
let clipboard = null;
let editingCell = null;
let undoStack = [], redoStack = [];
let isDragging = false, dragStart = null;
let currentBgColor = '#ffff00', currentFgColor = '#000000';
let findMatches = [], findIdx = 0;

const COLORS = [
  '#ffffff','#f2f2f2','#d9d9d9','#bfbfbf','#808080','#404040','#000000',
  '#ff0000','#ff4444','#ff9900','#ffff00','#00b050','#00b0f0','#0070c0',
  '#7030a0','#ff69b4','#ffa07a','#20b2aa','#87ceeb','#dda0dd','#98fb98',
  '#ffe4b5','#f0e68c','#e6e6fa','#fffacd','#d2f0d2','#ffdab9','#c8e6c9',
  '#bbdefb','#e1bee7'
];

function colLetter(i) {
  let s = '';
  while (i >= 0) { s = String.fromCharCode(65 + (i % 26)) + s; i = Math.floor(i / 26) - 1; }
  return s;
}
function cellId(r, c) { return colLetter(c) + (r + 1); }
function parseRef(ref) {
  const m = ref.match(/^([A-Z]+)(\d+)$/);
  if (!m) return null;
  let c = 0;
  for (let i = 0; i < m[1].length; i++) c = c * 26 + m[1].charCodeAt(i) - 64;
  return { r: parseInt(m[2]) - 1, c: c - 1 };
}

function getData() { return sheets[currentSheet].data; }
function getStyle() { return sheets[currentSheet].style; }

function getCellValue(r, c, visited = new Set()) {
  const key = cellId(r, c);
  const raw = getData()[key];
  if (!raw || raw === '') return '';
  if (raw[0] === '=') {
    if (visited.has(key)) return '#CIRC!';
    visited.add(key);
    return evalFormula(raw.slice(1), visited);
  }
  const n = parseFloat(raw);
  return isNaN(n) || raw.trim() === '' ? raw : n;
}

function evalFormula(expr, visited = new Set()) {
  try {
    const e = expr.toUpperCase().trim();

    const fnMatch = e.match(/^(SOMMA|SUM|MEDIA|AVERAGE|MAX|MIN|CONTA|COUNT|COUNTA|SE|IF|ABS|RADQ|SQRT|ARROTONDA|ROUND|POT|POWER|MOD|INT|TODAY|OGGI|AND|OR|NOT|CONCATENA|CONCATENATE|LUNGHEZZA|LEN|SINISTRA|LEFT|DESTRA|RIGHT|MAIUSC|UPPER|MINUSC|LOWER)\s*\((.*)\)$/s);

    if (fnMatch) {
      const fn = fnMatch[1], args = fnMatch[2];
      const rangeVals = (a) => {
        const rm = a.match(/^([A-Z]+\d+):([A-Z]+\d+)$/);
        if (rm) {
          const s = parseRef(rm[1]), en = parseRef(rm[2]);
          const vals = [];
          for (let rr = Math.min(s.r, en.r); rr <= Math.max(s.r, en.r); rr++)
            for (let cc = Math.min(s.c, en.c); cc <= Math.max(s.c, en.c); cc++)
              vals.push(getCellValue(rr, cc, visited));
          return vals;
        }
        const p = parseRef(a);
        if (p) return [getCellValue(p.r, p.c, visited)];
        const n = parseFloat(a);
        return [isNaN(n) ? a : n];
      };

      const nums = (a) => rangeVals(a).map(v => parseFloat(v)).filter(n => !isNaN(n));
      const splitArgs = (s) => {
        const parts = [], depth = []; let cur = '';
        for (const ch of s) {
          if (ch === '(') { depth.push(ch); cur += ch; }
          else if (ch === ')') { depth.pop(); cur += ch; }
          else if (ch === ';' && !depth.length) { parts.push(cur.trim()); cur = ''; }
          else cur += ch;
        }
        if (cur.trim()) parts.push(cur.trim());
        return parts;
      };

      if (['SOMMA','SUM'].includes(fn)) return splitArgs(args).flatMap(a => nums(a)).reduce((a,b) => a+b, 0);
      if (['MEDIA','AVERAGE'].includes(fn)) { const ns = splitArgs(args).flatMap(a => nums(a)); return ns.length ? ns.reduce((a,b)=>a+b,0)/ns.length : 0; }
      if (fn === 'MAX') return Math.max(...splitArgs(args).flatMap(a => nums(a)));
      if (fn === 'MIN') return Math.min(...splitArgs(args).flatMap(a => nums(a)));
      if (['CONTA','COUNT'].includes(fn)) return splitArgs(args).flatMap(a => nums(a)).length;
      if (fn === 'COUNTA') return splitArgs(args).flatMap(a => rangeVals(a)).filter(v => v !== '' && v !== undefined).length;
      if (['ABS'].includes(fn)) { const v = evalFormula(args, visited); return Math.abs(parseFloat(v)); }
      if (['RADQ','SQRT'].includes(fn)) { return Math.sqrt(parseFloat(evalFormula(args, visited))); }
      if (['ARROTONDA','ROUND'].includes(fn)) { const [n, d] = splitArgs(args); return parseFloat(parseFloat(evalFormula(n, visited)).toFixed(parseInt(evalFormula(d||'0', visited)))); }
      if (['POT','POWER'].includes(fn)) { const [b, ex] = splitArgs(args); return Math.pow(parseFloat(evalFormula(b,visited)), parseFloat(evalFormula(ex,visited))); }
      if (fn === 'MOD') { const [a, b] = splitArgs(args); return parseFloat(evalFormula(a,visited)) % parseFloat(evalFormula(b,visited)); }
      if (fn === 'INT') { return Math.floor(parseFloat(evalFormula(args, visited))); }
      if (['TODAY','OGGI'].includes(fn)) { const d = new Date(); return d.toLocaleDateString('it-IT'); }
      if (['SE','IF'].includes(fn)) {
        const [cond, tv, fv] = splitArgs(args);
        const condResult = evalFormula(cond, visited);
        return condResult && condResult !== '0' && condResult !== 'FALSO' && condResult !== 'FALSE' ? evalFormula(tv, visited) : evalFormula(fv||'0', visited);
      }
      if (['CONCATENA','CONCATENATE'].includes(fn)) { return splitArgs(args).map(a => { const p = parseRef(a); return p ? String(getCellValue(p.r, p.c, visited)) : a.replace(/^"|"$/g,''); }).join(''); }
      if (['LUNGHEZZA','LEN'].includes(fn)) { const p = parseRef(args); return p ? String(getCellValue(p.r, p.c, visited)).length : args.replace(/^"|"$/g,'').length; }
      if (['SINISTRA','LEFT'].includes(fn)) { const [ref, n] = splitArgs(args); const p = parseRef(ref); const s = p ? String(getCellValue(p.r, p.c, visited)) : ref.replace(/^"|"$/g,''); return s.slice(0, parseInt(evalFormula(n||'1',visited))); }
      if (['DESTRA','RIGHT'].includes(fn)) { const [ref, n] = splitArgs(args); const p = parseRef(ref); const s = p ? String(getCellValue(p.r, p.c, visited)) : ref.replace(/^"|"$/g,''); return s.slice(-parseInt(evalFormula(n||'1',visited))); }
      if (['MAIUSC','UPPER'].includes(fn)) { const p = parseRef(args); return p ? String(getCellValue(p.r, p.c, visited)).toUpperCase() : args.replace(/^"|"$/g,'').toUpperCase(); }
      if (['MINUSC','LOWER'].includes(fn)) { const p = parseRef(args); return p ? String(getCellValue(p.r, p.c, visited)).toLowerCase() : args.replace(/^"|"$/g,'').toLowerCase(); }
    }

    // Range reference
    const replaced = e.replace(/([A-Z]+\d+)/g, (m) => {
      const p = parseRef(m);
      if (!p) return m;
      const v = getCellValue(p.r, p.c, visited);
      if (v === '' || v === undefined) return '0';
      if (typeof v === 'number') return v;
      return JSON.stringify(String(v));
    }).replace(/>/g, '>').replace(/</g, '<').replace(/=/g, '===').replace(/====/g, '===').replace(/<>/g, '!==');

    return Function(`"use strict"; return (${replaced})`)();
  } catch(e) { return '#ERR!'; }
}

function formatValue(val, numFmt) {
  if (val === '' || val === undefined) return '';
  if (numFmt === 'currency' && !isNaN(parseFloat(val))) return new Intl.NumberFormat('it-IT', {style:'currency',currency:'EUR'}).format(val);
  if (numFmt === 'percent' && !isNaN(parseFloat(val))) return (parseFloat(val) * 100).toFixed(1) + '%';
  if (numFmt === 'number' && !isNaN(parseFloat(val))) return new Intl.NumberFormat('it-IT', {minimumFractionDigits:2,maximumFractionDigits:2}).format(val);
  return String(val);
}

// BUILD GRID
function buildGrid() {
  const table = document.getElementById('grid');
  table.innerHTML = '';
  const cw = sheets[currentSheet].colWidths;

  // Header row
  const hr = table.insertRow();
  const corner = hr.insertCell();
  corner.className = 'corner-header';
  corner.setAttribute('rowspan','1');
  corner.title = 'Seleziona tutto';
  corner.onclick = selectAll;

  for (let c = 0; c < COLS; c++) {
    const th = hr.insertCell();
    th.className = 'col-header';
    th.style.width = (cw[c] || 64) + 'px';
    th.style.minWidth = (cw[c] || 64) + 'px';
    th.dataset.col = c;
    th.innerHTML = `${colLetter(c)}<div class="col-resize" data-col="${c}"></div>`;
    th.onclick = (e) => { if (!e.target.classList.contains('col-resize')) selectColumn(c); };
  }

  // Data rows
  for (let r = 0; r < ROWS; r++) {
    const row = table.insertRow();
    const rh = row.insertCell();
    rh.className = 'row-header';
    rh.textContent = r + 1;
    rh.dataset.row = r;
    rh.onclick = () => selectRow(r);

    for (let c = 0; c < COLS; c++) {
      const td = row.insertCell();
      td.className = 'cell align-left';
      td.dataset.r = r; td.dataset.c = c;
      td.style.width = (cw[c] || 64) + 'px';
      td.style.minWidth = (cw[c] || 64) + 'px';
      td.tabIndex = -1;
      renderCell(td, r, c);
      td.onmousedown = (e) => cellMouseDown(e, r, c);
      td.ondblclick = () => startEdit(r, c);
      td.oncontextmenu = (e) => showCtxMenu(e, r, c);
      td.addEventListener('touchend', (e) => cellTouchEnd(e, r, c), { passive: false });
    }
  }

  setupColResize();
  highlightSelection();
}

function renderCell(td, r, c) {
  const key = cellId(r, c);
  const st = getStyle()[key] || {};
  const data = getData();
  const numFmt = st.numFmt || 'general';
  const raw = data[key] || '';

  let val = '';
  if (raw[0] === '=') val = getCellValue(r, c);
  else val = raw;

  td.textContent = formatValue(val, numFmt);
  td.style.fontWeight = st.bold ? 'bold' : '';
  td.style.fontStyle = st.italic ? 'italic' : '';
  td.style.textDecoration = st.underline ? 'underline' : '';
  td.style.backgroundColor = st.bg || '';
  td.style.color = st.fg || '';
  td.style.fontFamily = st.font || '';
  td.style.fontSize = st.size ? st.size + 'px' : '';
  td.style.border = st.border === 'none' ? '1px solid transparent' : st.border === 'all' ? '1px solid #888' : '';

  td.classList.remove('align-left','align-center','align-right');
  td.classList.add(st.align ? 'align-' + st.align : (typeof val === 'number' && numFmt !== 'text' ? 'align-right' : 'align-left'));
}

function refreshAll() {
  const table = document.getElementById('grid');
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const td = table.rows[r + 1]?.cells[c + 1];
      if (td) renderCell(td, r, c);
    }
  }
  updateStatusBar();
}

function getCell(r, c) {
  return document.getElementById('grid').rows[r + 1]?.cells[c + 1];
}

// SELECTION
function cellMouseDown(e, r, c) {
  if (e.button === 2) return;
  if (editingCell) commitEdit();
  if (e.shiftKey && selectionRange) {
    selectionRange.end = { r, c };
  } else {
    selectedCell = { r, c };
    selectionRange = { start: { r, c }, end: { r, c } };
    isDragging = true;
    dragStart = { r, c };
  }
  updateCellRef();
  updateFormulaBar();
  highlightSelection();
  updateStatusBar();
  e.preventDefault();
}

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const td = document.elementFromPoint(e.clientX, e.clientY);
  if (td && td.dataset.r !== undefined) {
    const r = parseInt(td.dataset.r), c = parseInt(td.dataset.c);
    selectionRange.end = { r, c };
    highlightSelection();
    updateStatusBar();
  }
});

document.addEventListener('mouseup', () => { isDragging = false; });

function highlightSelection() {
  const table = document.getElementById('grid');
  // Clear all highlights
  for (let r = 0; r < ROWS; r++) {
    if (!table.rows[r + 1]) continue;
    table.rows[r + 1].cells[0]?.classList.remove('sel');
    for (let c = 0; c < COLS; c++) {
      const td = table.rows[r + 1].cells[c + 1];
      if (td) { td.classList.remove('selected','in-range'); }
    }
  }
  for (let c = 0; c < COLS; c++) {
    table.rows[0]?.cells[c + 1]?.classList.remove('sel');
  }

  if (!selectionRange) return;
  const { start, end } = selectionRange;
  const r1 = Math.min(start.r, end.r), r2 = Math.max(start.r, end.r);
  const c1 = Math.min(start.c, end.c), c2 = Math.max(start.c, end.c);

  for (let r = r1; r <= r2; r++) {
    for (let c = c1; c <= c2; c++) {
      const td = getCell(r, c);
      if (td) {
        if (r === selectedCell.r && c === selectedCell.c) td.classList.add('selected');
        else td.classList.add('in-range');
      }
    }
    if (r1 !== r2 || c1 !== c2) table.rows[r + 1]?.cells[0]?.classList.add('sel');
  }
  if (r1 !== r2 || c1 !== c2) {
    for (let c = c1; c <= c2; c++) table.rows[0]?.cells[c + 1]?.classList.add('sel');
  } else {
    const td = getCell(selectedCell.r, selectedCell.c);
    if (td) td.classList.add('selected');
  }
}

function selectAll() {
  selectionRange = { start: { r: 0, c: 0 }, end: { r: ROWS-1, c: COLS-1 } };
  selectedCell = { r: 0, c: 0 };
  highlightSelection();
  updateStatusBar();
}
function selectRow(r) {
  selectedCell = { r, c: 0 };
  selectionRange = { start: { r, c: 0 }, end: { r, c: COLS-1 } };
  highlightSelection();
  updateStatusBar();
}
function selectColumn(c) {
  selectedCell = { r: 0, c };
  selectionRange = { start: { r: 0, c }, end: { r: ROWS-1, c } };
  highlightSelection();
  updateStatusBar();
}

function navigate(dr, dc) {
  if (editingCell) commitEdit();
  selectedCell.r = Math.max(0, Math.min(ROWS-1, selectedCell.r + dr));
  selectedCell.c = Math.max(0, Math.min(COLS-1, selectedCell.c + dc));
  selectionRange = { start: { ...selectedCell }, end: { ...selectedCell } };
  updateCellRef(); updateFormulaBar(); highlightSelection(); updateStatusBar();
  const td = getCell(selectedCell.r, selectedCell.c);
  if (td) td.scrollIntoView({ block: 'nearest', inline: 'nearest' });
}

function updateCellRef() {
  document.getElementById('cell-ref').value = cellId(selectedCell.r, selectedCell.c);
}
function updateFormulaBar() {
  const key = cellId(selectedCell.r, selectedCell.c);
  document.getElementById('formula-input').value = getData()[key] || '';
  const st = getStyle()[key] || {};
  document.getElementById('btn-bold').classList.toggle('active', !!st.bold);
  document.getElementById('btn-italic').classList.toggle('active', !!st.italic);
  document.getElementById('btn-underline').classList.toggle('active', !!st.underline);
  document.getElementById('font-family').value = st.font || 'Calibri';
  document.getElementById('font-size').value = st.size || 11;
  document.getElementById('num-format').value = st.numFmt || 'general';
}

// TOUCH SUPPORT
let lastTouchCell = null, lastTouchTime = 0;
function cellTouchEnd(e, r, c) {
  const now = Date.now();
  const isDoubleTap = lastTouchCell && lastTouchCell.r === r && lastTouchCell.c === c && (now - lastTouchTime) < 400;
  lastTouchCell = { r, c }; lastTouchTime = now;
  if (isDoubleTap) {
    e.preventDefault();
    startEdit(r, c);
    return;
  }
  // Single tap: select cell
  if (editingCell && (editingCell.r !== r || editingCell.c !== c)) commitEdit();
  else if (!editingCell) {
    selectedCell = { r, c };
    selectionRange = { start: { r, c }, end: { r, c } };
    updateCellRef(); updateFormulaBar(); highlightSelection(); updateStatusBar();
    e.preventDefault();
  }
}

// EDITING
function startEdit(r, c) {
  if (editingCell) commitEdit();
  editingCell = { r, c };
  const td = getCell(r, c);
  if (!td) return;
  const key = cellId(r, c);
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'cell-input';
  inp.value = getData()[key] || '';
  // These attributes help trigger the virtual keyboard on iOS/Android
  inp.setAttribute('autocomplete', 'off');
  inp.setAttribute('autocorrect', 'off');
  inp.setAttribute('autocapitalize', 'off');
  inp.setAttribute('spellcheck', 'false');
  inp.onkeydown = (e) => cellKeyDown(e, r, c);
  inp.oninput = (e) => { document.getElementById('formula-input').value = e.target.value; };
  inp.onblur = (e) => {
    // Delay to allow tapping other cells without double-commit
    setTimeout(() => { if (editingCell && editingCell.r === r && editingCell.c === c) commitEdit(); }, 100);
  };
  td.innerHTML = '';
  td.appendChild(inp);
  // Use requestAnimationFrame to ensure DOM is ready before focusing (important on iOS)
  requestAnimationFrame(() => {
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
  });
  document.getElementById('formula-input').value = inp.value;
  document.getElementById('status-mode').textContent = 'Modifica';
}

function commitEdit() {
  if (!editingCell) return;
  const { r, c } = editingCell;
  const td = getCell(r, c);
  const inp = td?.querySelector('input');
  if (!inp) { editingCell = null; return; }
  const val = inp.value;
  const key = cellId(r, c);
  pushUndo();
  getData()[key] = val;
  editingCell = null;
  renderCell(td, r, c);
  td.classList.add('selected');
  refreshAll();
  document.getElementById('formula-input').value = val;
  document.getElementById('status-mode').textContent = 'Pronto';
}

function cancelEdit() {
  if (!editingCell) return;
  const { r, c } = editingCell;
  const td = getCell(r, c);
  editingCell = null;
  renderCell(td, r, c);
  td.classList.add('selected');
  document.getElementById('status-mode').textContent = 'Pronto';
}

function cellKeyDown(e, r, c) {
  if (e.key === 'Enter') { commitEdit(); navigate(1, 0); e.preventDefault(); }
  else if (e.key === 'Tab') { commitEdit(); navigate(0, e.shiftKey ? -1 : 1); e.preventDefault(); }
  else if (e.key === 'Escape') { cancelEdit(); e.preventDefault(); }
  else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    const inp = e.target; if (inp.selectionStart === 0 && e.key === 'ArrowUp') { commitEdit(); navigate(-1, 0); e.preventDefault(); }
  }
  if (e.target) document.getElementById('formula-input').value = e.target.value;
}

function formulaKeyDown(e) {
  if (e.key === 'Enter') {
    const key = cellId(selectedCell.r, selectedCell.c);
    pushUndo();
    getData()[key] = e.target.value;
    if (editingCell) { editingCell = null; }
    refreshAll();
    navigate(1, 0);
    e.target.blur();
    e.preventDefault();
  } else if (e.key === 'Escape') {
    e.target.value = getData()[cellId(selectedCell.r, selectedCell.c)] || '';
    if (editingCell) cancelEdit();
    e.target.blur();
  }
}

function formulaInput(e) {
  if (editingCell) {
    const td = getCell(editingCell.r, editingCell.c);
    const inp = td?.querySelector('input');
    if (inp) inp.value = e.target.value;
  }
}

// KEYBOARD NAVIGATION
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' && e.target !== document.getElementById('cell-ref')) return;
  const { r, c } = selectedCell;

  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'c') { copyCell(); e.preventDefault(); }
    else if (e.key === 'x') { cutCell(); e.preventDefault(); }
    else if (e.key === 'v') { pasteCell(); e.preventDefault(); }
    else if (e.key === 'z') { undoAction(); e.preventDefault(); }
    else if (e.key === 'y') { redoAction(); e.preventDefault(); }
    else if (e.key === 'b') { toggleBold(); e.preventDefault(); }
    else if (e.key === 'i') { toggleItalic(); e.preventDefault(); }
    else if (e.key === 'u') { toggleUnderline(); e.preventDefault(); }
    else if (e.key === 'f') { toggleFind(); e.preventDefault(); }
    else if (e.key === 'Home') { navigate(-r, -c); e.preventDefault(); }
    else if (e.key === 'End') { navigate(ROWS-1-r, COLS-1-c); e.preventDefault(); }
    else if (e.key === 'a') { selectAll(); e.preventDefault(); }
    return;
  }

  if (editingCell) return;

  if (e.key === 'ArrowUp') { navigate(-1, 0); e.preventDefault(); }
  else if (e.key === 'ArrowDown') { navigate(1, 0); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { navigate(0, -1); e.preventDefault(); }
  else if (e.key === 'ArrowRight') { navigate(0, 1); e.preventDefault(); }
  else if (e.key === 'Tab') { navigate(0, e.shiftKey ? -1 : 1); e.preventDefault(); }
  else if (e.key === 'Enter') { navigate(1, 0); e.preventDefault(); }
  else if (e.key === 'Delete' || e.key === 'Backspace') {
    pushUndo();
    const key = cellId(r, c);
    delete getData()[key];
    refreshAll();
    updateFormulaBar();
    e.preventDefault();
  } else if (e.key === 'F2') { startEdit(r, c); e.preventDefault(); }
  else if (e.key.length === 1 && !e.altKey) {
    startEdit(r, c);
    const td = getCell(r, c);
    const inp = td?.querySelector('input');
    if (inp) { inp.value = e.key; inp.dispatchEvent(new Event('input')); }
    e.preventDefault();
  }
});

// FORMATTING
function applyStyleProp(prop, val) {
  pushUndo();
  eachSelected((r, c) => {
    const key = cellId(r, c);
    getStyle()[key] = getStyle()[key] || {};
    getStyle()[key][prop] = val;
    const td = getCell(r, c);
    if (td) renderCell(td, r, c);
  });
}

function toggleBold() {
  const key = cellId(selectedCell.r, selectedCell.c);
  const cur = (getStyle()[key] || {}).bold;
  eachSelected((r, c) => {
    const k = cellId(r, c);
    getStyle()[k] = getStyle()[k] || {};
    getStyle()[k].bold = !cur;
    renderCell(getCell(r, c), r, c);
  });
  document.getElementById('btn-bold').classList.toggle('active', !cur);
}

function toggleItalic() {
  const key = cellId(selectedCell.r, selectedCell.c);
  const cur = (getStyle()[key] || {}).italic;
  eachSelected((r, c) => {
    const k = cellId(r, c);
    getStyle()[k] = getStyle()[k] || {};
    getStyle()[k].italic = !cur;
    renderCell(getCell(r, c), r, c);
  });
  document.getElementById('btn-italic').classList.toggle('active', !cur);
}

function toggleUnderline() {
  const key = cellId(selectedCell.r, selectedCell.c);
  const cur = (getStyle()[key] || {}).underline;
  eachSelected((r, c) => {
    const k = cellId(r, c);
    getStyle()[k] = getStyle()[k] || {};
    getStyle()[k].underline = !cur;
    renderCell(getCell(r, c), r, c);
  });
  document.getElementById('btn-underline').classList.toggle('active', !cur);
}

function applyFont() { applyStyleProp('font', document.getElementById('font-family').value); }
function applyFontSize() { applyStyleProp('size', parseInt(document.getElementById('font-size').value)); }
function setAlign(a) { applyStyleProp('align', a); }
function applyNumFormat() { applyStyleProp('numFmt', document.getElementById('num-format').value); refreshAll(); }
function applyBorder(t) { applyStyleProp('border', t); }

// COLOR PICKERS
function buildColorPopup() {
  ['bg','fg'].forEach(type => {
    const popup = document.getElementById(`color-popup-${type}`);
    popup.innerHTML = '';
    COLORS.forEach(col => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch';
      sw.style.background = col;
      sw.onclick = (e) => { e.stopPropagation(); applyColor(type, col); popup.style.display = 'none'; };
      popup.appendChild(sw);
    });
  });
}

function toggleColorPicker(type) {
  const popup = document.getElementById(`color-popup-${type}`);
  const other = document.getElementById(`color-popup-${type === 'bg' ? 'fg' : 'bg'}`);
  other.style.display = 'none';
  popup.style.display = popup.style.display === 'flex' ? 'none' : 'flex';
}

function applyColor(type, col) {
  const prop = type === 'bg' ? 'bg' : 'fg';
  applyStyleProp(prop, col);
  document.getElementById(`${type}-indicator`).style.background = col;
  if (type === 'bg') currentBgColor = col; else currentFgColor = col;
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#color-popup-bg, #bg-color-btn')) document.getElementById('color-popup-bg').style.display = 'none';
  if (!e.target.closest('#color-popup-fg, #fg-color-btn')) document.getElementById('color-popup-fg').style.display = 'none';
  if (!e.target.closest('#ctx-menu')) document.getElementById('ctx-menu').style.display = 'none';
});

// CONTEXT MENU
function showCtxMenu(e, r, c) {
  e.preventDefault();
  if (!isInSelection(r, c)) { selectedCell = { r, c }; selectionRange = { start: { r, c }, end: { r, c } }; highlightSelection(); }
  const menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 250) + 'px';
}

function isInSelection(r, c) {
  if (!selectionRange) return false;
  const { start, end } = selectionRange;
  return r >= Math.min(start.r, end.r) && r <= Math.max(start.r, end.r) &&
         c >= Math.min(start.c, end.c) && c <= Math.max(start.c, end.c);
}

function ctxCopy() { document.getElementById('ctx-menu').style.display = 'none'; copyCell(); }
function ctxCut() { document.getElementById('ctx-menu').style.display = 'none'; cutCell(); }
function ctxPaste() { document.getElementById('ctx-menu').style.display = 'none'; pasteCell(); }

function ctxInsertRow() {
  document.getElementById('ctx-menu').style.display = 'none';
  pushUndo();
  const r = selectedCell.r;
  const data = getData(), style = getStyle();
  const newData = {}, newStyle = {};
  Object.keys(data).forEach(k => {
    const p = parseRef(k);
    if (p && p.r >= r) newData[cellId(p.r + 1, p.c)] = data[k];
    else if (p) newData[k] = data[k];
  });
  Object.keys(style).forEach(k => {
    const p = parseRef(k);
    if (p && p.r >= r) newStyle[cellId(p.r + 1, p.c)] = style[k];
    else if (p) newStyle[k] = style[k];
  });
  sheets[currentSheet].data = newData; sheets[currentSheet].style = newStyle;
  buildGrid();
}

function ctxDeleteRow() {
  document.getElementById('ctx-menu').style.display = 'none';
  pushUndo();
  const r = selectedCell.r;
  const data = getData(), style = getStyle();
  const newData = {}, newStyle = {};
  Object.keys(data).forEach(k => {
    const p = parseRef(k);
    if (p && p.r > r) newData[cellId(p.r - 1, p.c)] = data[k];
    else if (p && p.r !== r) newData[k] = data[k];
  });
  Object.keys(style).forEach(k => {
    const p = parseRef(k);
    if (p && p.r > r) newStyle[cellId(p.r - 1, p.c)] = style[k];
    else if (p && p.r !== r) newStyle[k] = style[k];
  });
  sheets[currentSheet].data = newData; sheets[currentSheet].style = newStyle;
  buildGrid();
}

function ctxInsertCol() {
  document.getElementById('ctx-menu').style.display = 'none';
  pushUndo();
  const cc = selectedCell.c;
  const data = getData(), style = getStyle();
  const newData = {}, newStyle = {};
  Object.keys(data).forEach(k => {
    const p = parseRef(k);
    if (p && p.c >= cc) newData[cellId(p.r, p.c + 1)] = data[k];
    else if (p) newData[k] = data[k];
  });
  Object.keys(style).forEach(k => {
    const p = parseRef(k);
    if (p && p.c >= cc) newStyle[cellId(p.r, p.c + 1)] = style[k];
    else if (p) newStyle[k] = style[k];
  });
  sheets[currentSheet].data = newData; sheets[currentSheet].style = newStyle;
  buildGrid();
}

function ctxDeleteCol() {
  document.getElementById('ctx-menu').style.display = 'none';
  pushUndo();
  const cc = selectedCell.c;
  const data = getData(), style = getStyle();
  const newData = {}, newStyle = {};
  Object.keys(data).forEach(k => {
    const p = parseRef(k);
    if (p && p.c > cc) newData[cellId(p.r, p.c - 1)] = data[k];
    else if (p && p.c !== cc) newData[k] = data[k];
  });
  Object.keys(style).forEach(k => {
    const p = parseRef(k);
    if (p && p.c > cc) newStyle[cellId(p.r, p.c - 1)] = style[k];
    else if (p && p.c !== cc) newStyle[k] = style[k];
  });
  sheets[currentSheet].data = newData; sheets[currentSheet].style = newStyle;

}

function clearCells() {
  document.getElementById('ctx-menu').style.display = 'none';
  pushUndo();
  eachSelected((r, c) => { delete getData()[cellId(r, c)]; });
  refreshAll(); updateFormulaBar();
}

function clearFormatting() {
  document.getElementById('ctx-menu').style.display = 'none';
  pushUndo();
  eachSelected((r, c) => { delete getStyle()[cellId(r, c)]; renderCell(getCell(r, c), r, c); });
}

// CLIPBOARD
function eachSelected(fn) {
  if (!selectionRange) { fn(selectedCell.r, selectedCell.c); return; }
  const { start, end } = selectionRange;
  for (let r = Math.min(start.r, end.r); r <= Math.max(start.r, end.r); r++)
    for (let c = Math.min(start.c, end.c); c <= Math.max(start.c, end.c); c++)
      fn(r, c);
}

function copyCell() {
  if (!selectionRange) selectionRange = { start: { ...selectedCell }, end: { ...selectedCell } };
  const { start, end } = selectionRange;
  clipboard = { type: 'copy', data: {}, style: {}, startR: Math.min(start.r, end.r), startC: Math.min(start.c, end.c) };
  eachSelected((r, c) => {
    const key = cellId(r, c);
    clipboard.data[key] = getData()[key];
    clipboard.style[key] = getStyle()[key];
  });
  document.getElementById('status-mode').textContent = 'Copiato';
}

function cutCell() {
  copyCell();
  clipboard.type = 'cut';
}

function pasteCell() {
  if (!clipboard) return;
  pushUndo();
  const dr = selectedCell.r - clipboard.startR;
  const dc = selectedCell.c - clipboard.startC;
  Object.keys(clipboard.data).forEach(k => {
    const p = parseRef(k);
    if (!p) return;
    const nr = p.r + dr, nc = p.c + dc;
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return;
    const nk = cellId(nr, nc);
    getData()[nk] = clipboard.data[k];
    if (clipboard.style[k]) getStyle()[nk] = { ...clipboard.style[k] };
  });
  if (clipboard.type === 'cut') {
    Object.keys(clipboard.data).forEach(k => { delete getData()[k]; delete getStyle()[k]; });
    clipboard = null;
  }
  refreshAll();
}

// UNDO/REDO
function snapshotState() { return { data: JSON.parse(JSON.stringify(getData())), style: JSON.parse(JSON.stringify(getStyle())) }; }
function pushUndo() {
  undoStack.push(snapshotState());
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function undoAction() {
  if (!undoStack.length) return;
  redoStack.push(snapshotState());
  const s = undoStack.pop();
  sheets[currentSheet].data = s.data; sheets[currentSheet].style = s.style;
  refreshAll(); updateFormulaBar();
}

function redoAction() {
  if (!redoStack.length) return;
  undoStack.push(snapshotState());
  const s = redoStack.pop();
  sheets[currentSheet].data = s.data; sheets[currentSheet].style = s.style;
  refreshAll(); updateFormulaBar();
}

// SORT
function sortRange(dir) {
  if (!selectionRange) return;
  pushUndo();
  const { start, end } = selectionRange;
  const r1 = Math.min(start.r, end.r), r2 = Math.max(start.r, end.r);
  const c1 = Math.min(start.c, end.c);
  const rows = [];
  for (let r = r1; r <= r2; r++) {
    const rowData = {};
    for (let c = Math.min(start.c, end.c); c <= Math.max(start.c, end.c); c++) {
      const k = cellId(r, c); rowData[c] = getData()[k];
    }
    rows.push(rowData);
  }
  rows.sort((a, b) => {
    const va = a[c1] || '', vb = b[c1] || '';
    const na = parseFloat(va), nb = parseFloat(vb);
    const cmp = (!isNaN(na) && !isNaN(nb)) ? na - nb : String(va).localeCompare(String(vb));
    return dir === 'asc' ? cmp : -cmp;
  });
  rows.forEach((rowData, i) => {
    const r = r1 + i;
    for (let c = Math.min(start.c, end.c); c <= Math.max(start.c, end.c); c++) {
      const k = cellId(r, c);
      if (rowData[c] !== undefined) getData()[k] = rowData[c];
      else delete getData()[k];
    }
  });
  refreshAll();
}

// AUTO-SUM
function insertFormula(fn) {
  const { r, c } = selectedCell;
  let range = '';
  if (r > 0) {
    let top = r - 1;
    while (top > 0 && getData()[cellId(top - 1, c)]) top--;
    range = cellId(top, c) + ':' + cellId(r - 1, c);
  }
  pushUndo();
  const key = cellId(r, c);
  getData()[key] = `=${fn}(${range})`;
  document.getElementById('formula-input').value = getData()[key];
  refreshAll();
}

// STATUS BAR
function updateStatusBar() {
  const nums = [];
  eachSelected((r, c) => {
    const v = getCellValue(r, c);
    if (!isNaN(parseFloat(v)) && v !== '') nums.push(parseFloat(v));
  });
  const total = nums.reduce((a, b) => a + b, 0);
  document.getElementById('stat-count').textContent = nums.length > 0 ? `Conteggio: ${nums.length}` : '';
  document.getElementById('stat-sum').textContent = nums.length > 1 ? `Somma: ${total.toFixed(2)}` : '';
  document.getElementById('stat-avg').textContent = nums.length > 1 ? `Media: ${(total/nums.length).toFixed(2)}` : '';
}

// FIND
function toggleFind() {
  const bar = document.getElementById('find-bar');
  bar.classList.toggle('visible');
  if (bar.classList.contains('visible')) { document.getElementById('find-input').focus(); doFind(); }
  else { clearFindHighlight(); }
}

function clearFindHighlight() {
  document.querySelectorAll('.cell.find-match').forEach(td => td.classList.remove('find-match'));
}

function doFind() {
  clearFindHighlight();
  const q = document.getElementById('find-input').value.toLowerCase().trim();
  findMatches = [];
  if (!q) { document.getElementById('find-count').textContent = ''; return; }
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = String(getCellValue(r, c) || '').toLowerCase();
      if (v.includes(q)) { findMatches.push({ r, c }); const td = getCell(r, c); if (td) td.style.background = '#fff3cd'; }
    }
  }
  document.getElementById('find-count').textContent = findMatches.length ? `${findMatches.length} risultati` : 'Nessun risultato';
  findIdx = 0;
  if (findMatches.length) gotoFindMatch(0);
}

function findKeyDown(e) { if (e.key === 'Enter') findNext(1); else if (e.key === 'Escape') toggleFind(); }
function findNext(dir) {
  if (!findMatches.length) return;
  findIdx = (findIdx + dir + findMatches.length) % findMatches.length;
  gotoFindMatch(findIdx);
}
function gotoFindMatch(i) {
  const { r, c } = findMatches[i];
  selectedCell = { r, c };
  selectionRange = { start: { r, c }, end: { r, c } };
  highlightSelection(); updateCellRef(); updateFormulaBar();
  getCell(r, c)?.scrollIntoView({ block: 'center', inline: 'center' });
}

// SHEETS
function renderSheetTabs() {
  const list = document.getElementById('tabs-list');
  list.innerHTML = '';
  sheets.forEach((sh, i) => {
    const tab = document.createElement('div');
    tab.className = 'sheet-tab' + (i === currentSheet ? ' active' : '');
    tab.textContent = sh.name;
    tab.onclick = () => switchSheet(i);
    tab.ondblclick = () => renameSheet(i, tab);
    tab.oncontextmenu = (e) => { e.preventDefault(); if (sheets.length > 1 && confirm(`Eliminare "${sh.name}"?`)) { sheets.splice(i, 1); if (currentSheet >= sheets.length) currentSheet = sheets.length - 1; renderSheetTabs(); buildGrid(); } };
    list.appendChild(tab);
  });
}

function switchSheet(i) {
  if (editingCell) commitEdit();
  currentSheet = i;
  renderSheetTabs(); buildGrid(); updateFormulaBar(); updateCellRef();
}

function addSheet() {
  sheets.push({ name: `Foglio${sheets.length + 1}`, data: {}, style: {}, colWidths: {} });
  switchSheet(sheets.length - 1);
}

function renameSheet(i, tab) {
  const inp = document.createElement('input');
  inp.value = sheets[i].name;
  inp.style.cssText = 'width:80px;border:1px solid #217346;border-radius:2px;padding:2px 4px;font-size:11px;';
  tab.innerHTML = '';
  tab.appendChild(inp);
  inp.focus(); inp.select();
  const done = () => { sheets[i].name = inp.value || sheets[i].name; renderSheetTabs(); };
  inp.onblur = done;
  inp.onkeydown = (e) => { if (e.key === 'Enter') inp.blur(); else if (e.key === 'Escape') { inp.value = sheets[i].name; inp.blur(); } };
}

// COL RESIZE
function setupColResize() {
  document.querySelectorAll('.col-resize').forEach(handle => {
    let startX, startW, col;
    handle.onmousedown = (e) => {
      col = parseInt(handle.dataset.col);
      startX = e.clientX;
      startW = sheets[currentSheet].colWidths[col] || 64;
      handle.classList.add('dragging');
      const onMove = (ev) => {
        const newW = Math.max(20, startW + ev.clientX - startX);
        sheets[currentSheet].colWidths[col] = newW;
        document.querySelectorAll(`[data-col="${col}"]`).forEach(el => { el.style.width = newW + 'px'; el.style.minWidth = newW + 'px'; });
        document.querySelectorAll(`.cell[data-c="${col}"]`).forEach(el => { el.style.width = newW + 'px'; el.style.minWidth = newW + 'px'; el.style.maxWidth = newW + 'px'; });
      };
      const onUp = () => { handle.classList.remove('dragging'); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.stopPropagation(); e.preventDefault();
    };
  });
}

// SAVE/LOAD CSV
function saveCSV() {
  const data = getData();
  let maxR = 0, maxC = 0;
  Object.keys(data).forEach(k => { const p = parseRef(k); if (p) { maxR = Math.max(maxR, p.r); maxC = Math.max(maxC, p.c); } });
  const rows = [];
  for (let r = 0; r <= maxR; r++) {
    const row = [];
    for (let c = 0; c <= maxC; c++) row.push('"' + (data[cellId(r, c)] || '').replace(/"/g, '""') + '"');
    rows.push(row.join(','));
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById('filename-lbl').textContent || 'foglio') + '';
  a.click();
}

function loadCSV() { document.getElementById('csv-file').click(); }
function handleCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  document.getElementById('filename-lbl').textContent = file.name;
  const reader = new FileReader();
  reader.onload = (ev) => {
    pushUndo();
    const lines = ev.target.result.split('\n');
    lines.forEach((line, r) => {
      const cells = line.match(/("(?:[^"]|"")*"|[^,]*)/g) || [];
      cells.forEach((cell, c) => {
        const v = cell.replace(/^"|"$/g, '').replace(/""/g, '"');
        if (v) getData()[cellId(r, c)] = v;
      });
    });
    refreshAll();
  };
  reader.readAsText(file);
  e.target.value = '';
}

function printSheet() { window.print(); }
